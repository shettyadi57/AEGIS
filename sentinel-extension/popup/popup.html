<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AEGIS Sentinel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      min-height: 420px;
      background: #0B0F19;
      color: #E2E8F0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #121826, #0f1620);
      border-bottom: 1px solid rgba(79, 156, 249, 0.2);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #4F9CF9, #2563EB);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: white;
      box-shadow: 0 0 12px rgba(79, 156, 249, 0.4);
    }

    .header-text h1 {
      font-size: 14px;
      font-weight: 700;
      color: #F1F5F9;
      letter-spacing: 0.5px;
    }

    .header-text p {
      font-size: 11px;
      color: #64748B;
      margin-top: 1px;
    }

    .status-badge {
      margin-left: auto;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .status-badge.active {
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #22C55E;
    }

    .status-badge.inactive {
      background: rgba(100, 116, 139, 0.15);
      border: 1px solid rgba(100, 116, 139, 0.3);
      color: #64748B;
    }

    .content { padding: 16px; }

    .session-card {
      background: #121826;
      border: 1px solid rgba(79, 156, 249, 0.15);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .session-card h3 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #4F9CF9;
      margin-bottom: 10px;
    }

    .session-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .session-item label {
      font-size: 10px;
      color: #64748B;
      display: block;
      margin-bottom: 2px;
    }

    .session-item span {
      font-size: 13px;
      font-weight: 600;
      color: #E2E8F0;
    }

    .monitor-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .monitor-row:last-child { border-bottom: none; }

    .monitor-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #94A3B8;
    }

    .monitor-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22C55E;
      animation: pulse 2s infinite;
    }

    .monitor-dot.inactive { background: #374151; animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .violation-count {
      font-size: 12px;
      font-weight: 700;
      color: #EF4444;
      background: rgba(239,68,68,0.1);
      padding: 2px 8px;
      border-radius: 10px;
    }

    .controls {
      margin-top: 14px;
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-start {
      background: linear-gradient(135deg, #4F9CF9, #2563EB);
      color: white;
      box-shadow: 0 4px 12px rgba(79, 156, 249, 0.3);
    }

    .btn-start:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(79, 156, 249, 0.4); }

    .btn-stop {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #EF4444;
    }

    .btn-stop:hover { background: rgba(239, 68, 68, 0.25); }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .input-group {
      margin-bottom: 10px;
    }

    .input-group label {
      display: block;
      font-size: 11px;
      color: #64748B;
      margin-bottom: 4px;
      font-weight: 500;
    }

    .input-group input {
      width: 100%;
      background: #1E293B;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      padding: 8px 10px;
      color: #E2E8F0;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-group input:focus {
      border-color: #4F9CF9;
    }

    .footer {
      padding: 10px 18px;
      border-top: 1px solid rgba(255,255,255,0.05);
      font-size: 10px;
      color: #374151;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">⚡</div>
    <div class="header-text">
      <h1>AEGIS Sentinel</h1>
      <p>Exam Integrity Monitor</p>
    </div>
    <div class="status-badge inactive" id="statusBadge">Idle</div>
  </div>

  <div class="content">
    <!-- Setup Form -->
    <div id="setupForm">
      <div class="input-group">
        <label>Student ID</label>
        <input type="text" id="studentId" placeholder="e.g. S101" value="S101" />
      </div>
      <div class="input-group">
        <label>Exam ID</label>
        <input type="text" id="examId" placeholder="e.g. EXAM001" value="EXAM001" />
      </div>
    </div>

    <!-- Session Info (shown when active) -->
    <div id="sessionInfo" style="display:none;">
      <div class="session-card">
        <h3>Session Active</h3>
        <div class="session-grid">
          <div class="session-item">
            <label>Student ID</label>
            <span id="sessionStudent">—</span>
          </div>
          <div class="session-item">
            <label>Exam ID</label>
            <span id="sessionExam">—</span>
          </div>
          <div class="session-item">
            <label>Duration</label>
            <span id="sessionDuration">0:00</span>
          </div>
          <div class="session-item">
            <label>Violations</label>
            <span id="sessionViolations" style="color:#EF4444;">0</span>
          </div>
        </div>
      </div>

      <div class="session-card">
        <h3>Monitors</h3>
        <div class="monitor-row">
          <div class="monitor-label"><div class="monitor-dot" id="dotKeyboard"></div>Keyboard</div>
          <span style="font-size:11px;color:#4F9CF9;">Active</span>
        </div>
        <div class="monitor-row">
          <div class="monitor-label"><div class="monitor-dot" id="dotCamera"></div>Camera</div>
          <span style="font-size:11px;color:#4F9CF9;">Active</span>
        </div>
        <div class="monitor-row">
          <div class="monitor-label"><div class="monitor-dot" id="dotMic"></div>Microphone</div>
          <span style="font-size:11px;color:#4F9CF9;">Active</span>
        </div>
        <div class="monitor-row">
          <div class="monitor-label"><div class="monitor-dot" id="dotTabs"></div>Tab Monitor</div>
          <span style="font-size:11px;color:#4F9CF9;">Active</span>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-start" id="btnStart">▶ Start Monitoring</button>
      <button class="btn btn-stop" id="btnStop" disabled>■ Stop</button>
    </div>
  </div>

  <div class="footer">AEGIS v1.0 — Advanced Exam Guardrail Integrity System</div>

  <script src="popup.js"></script>
</body>
</html>
